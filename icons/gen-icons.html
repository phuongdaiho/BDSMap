<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Tạo icon</title>
<style>body{font-family:sans-serif;padding:24px;max-width:480px}
button{margin:6px 4px;padding:8px 16px;background:#1a73e8;color:white;border:none;border-radius:6px;cursor:pointer}
canvas{display:none}</style>
</head>
<body>
<h2>Tạo icon cho PWA</h2>
<p>Nhấn nút để tải về các file PNG và đặt vào thư mục <code>icons/</code></p>
<button onclick="gen(192)">Tải icon-192.png</button>
<button onclick="gen(512)">Tải icon-512.png</button>
<button onclick="gen(180,'apple-touch-icon')">Tải apple-touch-icon.png</button>
<canvas id="c"></canvas>
<script>
function gen(size, name) {
  const canvas = document.getElementById('c');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size;

  // Nền gradient xanh
  const bg = ctx.createLinearGradient(0, 0, 0, s);
  bg.addColorStop(0, '#1a73e8');
  bg.addColorStop(1, '#0d47a1');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();

  // Vẽ pin map
  const cx = s / 2, cy = s * 0.42, r = s * 0.24;
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  // Đuôi pin
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.55, cy + r * 0.7);
  ctx.lineTo(cx + r * 0.55, cy + r * 0.7);
  ctx.lineTo(cx, cy + r * 1.7);
  ctx.closePath();
  ctx.fill();
  // Vòng tròn trong
  ctx.fillStyle = '#1a73e8';
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.45, 0, Math.PI * 2);
  ctx.fill();

  const link = document.createElement('a');
  link.download = (name || ('icon-' + size)) + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
